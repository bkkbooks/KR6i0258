body:
  text: 後漢安息國三藏安世高譯佛在羅閲祇耆闍崛山中時摩訶比丘僧萬二千人皆阿羅漢時諸菩薩有四百億萬人皆賢者如彌勒輩也及八方上下諸菩薩稍增無央數不可復計皆飛到佛所前以頭面著佛足起繞佛七匝却坐上下相次百億萬重不可復勝數文殊師利菩薩最高才第一光明智慧與諸菩薩絶異無能及者時佛坐三昧佛身神外衣中衣佛坐光照悉不現即八方上下無數佛國悉皆明諸有佛國皆自然供養諸佛菩薩及辟支佛羅漢諸比丘僧八方上下無數諸佛各遣諸菩薩飛到佛所坐處邊坐諸菩薩皆會其數如恆水邊流沙一沙者為一菩薩如是四十恆邊沙皆悉上下相次一菩薩者自然坐一大蓮華上佛都却化天地界數千萬里諸菩薩皆坐滿其中已彌勒菩薩等及舍利弗即前叉手問文殊師利菩薩言仁者最高才佛向者三昧今皆不現不知所至疑當有意願欲聞之文殊師利謂彌勒言仁者高才且暮當作佛舍利弗者卿是佛弟子得羅漢道最智慧才猛何不各自一心坐禪推索佛身神知何如行乎即諸菩薩及阿羅漢等無央數皆坐一心推索八方上下無數諸佛國無窮無極無有能知佛身神處者彌勒菩薩等舍利弗等復長跪叉手問文殊師利菩薩我等一心推索佛身神無能知處者願欲知其説文殊師利言皆悉安坐須臾頃自當來還聞佛還劇坐座中皆見佛來還時皆歡喜起為佛作禮禮彌勒菩薩等舍利弗等前長跪叉手問佛向者三昧時佛身神外衣中衣皆悉不現亦不知如行我等共一心禪索佛身神八方上下無窮無極了不知佛處願從佛聞佛言所至到處者大深非汝曹所知也獨諸佛自知之耳佛言三昧者甚難值也與相值聞知者甚快不可言也所以者何甚難聞也佛言諸菩薩求道奉行六波羅蜜不毀失千億萬劫尚不能得值佛三昧時亦不能得聞知佛三昧名也復行六波羅蜜精進不懈三千億萬劫聞佛三昧名與相值尚復不信向之有也復行六波羅蜜不毀失七千億萬劫聞佛三昧者尚復不信向之有也復行六波羅蜜不毀失八千億萬劫聞佛三昧名者乃信向值之耳信向有者一時之間若與相值者心中歡喜踊躍一日一夜勝復行六波羅蜜却後三千億萬劫也所以者何聞知三昧者其後求道得佛疾佛三昧名者是摩訶般若波羅蜜經智慧印也菩薩求道得聞摩訶般若波羅蜜經智慧印者大善不可得聞也菩薩求道欲得作佛要當得摩訶般若波羅蜜經摩訶般若波羅蜜經者是八方上下諸佛大父母也得摩訶般若波羅蜜經乃得作佛耳菩薩求道要當積功纍德滿乃聞摩訶般若波羅蜜經耳菩薩求道不得摩訶般若波羅蜜經者不得作佛也佛言其有善男子善女人信向有佛三昧經名對其跪拜慈心歡喜者其人即得其福後世亦復得其福壽終盡生天上作天王壽盡下生世間復作遮迦越王如是壽終生天上天上壽終下生王侯家展轉天道人道中終不復更泥犁禽獸薜荔鬼神龍却後無數劫皆當作佛其有聞三昧名小有狐疑不信大如毛髮者其人壽終已入十八泥犁中燒煮終無有出時然後得出求道者未央作佛也所以者何佛三昧經是八方上下諸佛要決印明也佛言我所語如是汝曹皆當信之無得疑也誰當證明之者獨有四十恆水邊流沙諸菩薩是我小弟皆證明之耳佛説經已文殊師利菩薩等彌勒菩薩等舍利弗阿羅漢等及諸天人民聞經皆大歡喜起為佛作禮
